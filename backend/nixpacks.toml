[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=ext-bcmath --ignore-platform-req=ext-gd"]

[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
